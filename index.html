<style>

:root{
    --primary:#1E88E5;
    --secondary:#00C2FF;
    --accent:#7ED957;
    --dark:#0B1220;
    --text:#2B2F38;
    --light:#F8FAFC;
    --card:#FFFFFF;
    --border:#E5E7EB;
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

html{
    scroll-behavior:smooth;
}

body{
    font-family:'Inter',sans-serif;
    background:#fff;
    color:var(--text);
    overflow-x:hidden;
}

.container{
    width:min(1200px,90%);
    margin:auto;
}

/* HEADER */

header{
    position:fixed;
    top:0;
    width:100%;
    z-index:999;
    background:rgba(255,255,255,.9);
    backdrop-filter:blur(20px);
    border-bottom:1px solid rgba(0,0,0,.05);
}

.nav{
    height:80px;
    display:flex;
    align-items:center;
    justify-content:space-between;
}

.logo{
    font-size:1.4rem;
    font-weight:800;
    color:var(--dark);
}

.logo span{
    background:linear-gradient(135deg,#7ED957,#00C2FF,#1E88E5);
    -webkit-background-clip:text;
    color:transparent;
}

.menu{
    display:flex;
    gap:40px;
}

.menu a{
    text-decoration:none;
    color:#555;
    font-weight:500;
}

.btn{
    padding:14px 26px;
    border-radius:12px;
    text-decoration:none;
    font-weight:600;
    transition:.3s;
}

.btn-primary{
    background:linear-gradient(
    135deg,
    #7ED957,
    #00C2FF,
    #1E88E5);
    color:#fff;
}

.btn-primary:hover{
    transform:translateY(-3px);
}

/* HERO */

.hero{
    min-height:100vh;
    display:flex;
    align-items:center;
    padding-top:100px;
    background:
    radial-gradient(circle at top left,
    rgba(126,217,87,.18),
    transparent 35%),
    radial-gradient(circle at top right,
    rgba(0,194,255,.15),
    transparent 40%);
}

.hero-grid{
    display:grid;
    grid-template-columns:1fr 1fr;
    align-items:center;
    gap:80px;
}

.tag{
    display:inline-block;
    padding:10px 18px;
    border-radius:999px;
    background:#eef8ff;
    color:var(--primary);
    font-size:.9rem;
    font-weight:600;
    margin-bottom:20px;
}

.hero h1{
    font-size:4rem;
    line-height:1.05;
    color:var(--dark);
    margin-bottom:25px;
}

.gradient{
    background:linear-gradient(
    135deg,
    #7ED957,
    #00C2FF,
    #1E88E5);
    -webkit-background-clip:text;
    color:transparent;
}

.hero p{
    font-size:1.2rem;
    line-height:1.8;
    color:#667085;
    margin-bottom:35px;
}

.hero-buttons{
    display:flex;
    gap:20px;
}

.btn-outline{
    border:1px solid #dfe5eb;
    color:var(--dark);
}

.hero-image{
    display:flex;
    justify-content:center;
    align-items:center;
}

.hero-image img{
    width:100%;
    max-width:600px;
    animation:float 6s ease-in-out infinite;
    filter:drop-shadow(0 30px 60px rgba(0,0,0,.12));
}

@keyframes float{
    0%,100%{
        transform:translateY(0);
    }
    50%{
        transform:translateY(-15px);
    }
}

/* SECTION */

section{
    padding:100px 0;
}

.section-title{
    text-align:center;
    margin-bottom:60px;
}

.section-title h2{
    font-size:3rem;
    color:var(--dark);
}

.section-title p{
    color:#667085;
    margin-top:15px;
}

/* SERVICES */

.cards{
    display:grid;
    grid-template-columns:repeat(4,1fr);
    gap:25px;
}

.card{
    background:#fff;
    border:1px solid var(--border);
    padding:35px;
    border-radius:24px;
    transition:.35s;
}

.card:hover{
    transform:translateY(-10px);
    border-color:#00C2FF;
    box-shadow:0 25px 50px rgba(0,0,0,.08);
}

.icon{
    font-size:2rem;
    margin-bottom:20px;
}

.card h3{
    margin-bottom:15px;
}

/* TIMELINE */

.timeline{
    display:flex;
    justify-content:space-between;
    gap:20px;
}

.step{
    flex:1;
    text-align:center;
}

.circle{
    width:80px;
    height:80px;
    margin:auto;
    border-radius:50%;
    background:linear-gradient(
    135deg,
    #7ED957,
    #00C2FF);
    color:white;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:1.5rem;
    font-weight:700;
    margin-bottom:20px;
}

/* ECOSSISTEMA */

.ecosystem{
    display:grid;
    grid-template-columns:repeat(2,1fr);
    gap:30px;
}

.eco-card{
    background:white;
    border:1px solid var(--border);
    border-radius:24px;
    padding:35px;
}

/* TECH */

.badges{
    display:flex;
    flex-wrap:wrap;
    gap:15px;
    justify-content:center;
}

.badge{
    padding:14px 24px;
    background:#F5F8FB;
    border-radius:999px;
    font-weight:600;
}

/* NUMBERS */

.stats{
    display:grid;
    grid-template-columns:repeat(4,1fr);
    gap:25px;
}

.stat{
    text-align:center;
    padding:40px;
    background:#fff;
    border-radius:24px;
    border:1px solid var(--border);
}

.stat h3{
    font-size:3rem;
    background:linear-gradient(
    135deg,
    #7ED957,
    #1E88E5);
    -webkit-background-clip:text;
    color:transparent;
}

/* CTA */

.cta{
    background:linear-gradient(
    135deg,
    #7ED957,
    #00C2FF,
    #1E88E5);
    color:white;
    text-align:center;
    border-radius:40px;
    padding:80px;
}

.cta h2{
    font-size:3rem;
    margin-bottom:20px;
}

.cta .btn{
    background:white;
    color:var(--dark);
}

/* FOOTER */

footer{
    padding:80px 0;
    text-align:center;
}

footer h3{
    margin-bottom:15px;
}

footer p{
    color:#667085;
}

/* RESPONSIVE */

@media(max-width:992px){

.hero-grid,
.cards,
.stats,
.ecosystem{
    grid-template-columns:1fr;
}

.timeline{
    flex-direction:column;
}

.hero h1{
    font-size:2.8rem;
}

.menu{
    display:none;
}

.hero-buttons{
    flex-direction:column;
}

}

</style>

  <!-- MODAL -->
<div id="videoModal"
     style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:9999;align-items:center;justify-content:center;">

    <div style="position:relative;width:min(90vw,1100px);">

        <button onclick="closeVideo()"
                style="position:absolute;top:-50px;right:0;background:none;border:none;color:#fff;font-size:2rem;cursor:pointer;">
            ×
        </button>

        <div style="position:relative;padding-bottom:56.25%;height:0;">
            <iframe id="videoFrame"
                    src=""
                    allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
                    allowfullscreen
                    style="position:absolute;top:0;left:0;width:100%;height:100%;border:0;border-radius:12px;">
            </iframe>
        </div>

    </div>

</div>
<!-- /MODAL -->

  
<script>
function openVideo(url) {
    const modal = document.getElementById('videoModal');
    const frame = document.getElementById('videoFrame');

    frame.src = url;
    modal.style.display = 'flex';
}

function closeVideo() {
    const modal = document.getElementById('videoModal');
    const frame = document.getElementById('videoFrame');

    modal.style.display = 'none';
    frame.src = '';
}

document.getElementById('videoModal').addEventListener('click', function(e) {
    if (e.target === this) {
        closeVideo();
    }
});
</script>
