<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>AngelOS • Sistema Cognitivo Infantil</title>

<style>
    body{
        margin:0;
        font-family: Arial, sans-serif;
        background:#0b0f1a;
        color:#e8e8e8;
    }

    header{
        padding:22px;
        text-align:center;
        background:#121a2b;
        border-bottom:1px solid #1f2a44;
    }

    header h1{
        margin:0;
        font-size:20px;
        letter-spacing:.5px;
    }

    header small{
        opacity:.7;
    }

    .grid{
        display:grid;
        grid-template-columns: 1fr 1fr;
        gap:14px;
        padding:14px;
    }

    .card{
        background:#121a2b;
        border:1px solid #1f2a44;
        border-radius:12px;
        padding:14px;
    }

    h3{
        margin-top:0;
    }

    label{
        font-size:12px;
        opacity:.8;
    }

    select, input, textarea{
        width:100%;
        margin:6px 0 10px;
        padding:8px;
        border-radius:8px;
        border:none;
        background:#0b0f1a;
        color:#fff;
    }

    button{
        width:100%;
        padding:10px;
        border:none;
        border-radius:10px;
        background:#4f7cff;
        color:white;
        cursor:pointer;
    }

    button:hover{
        background:#3b63d1;
    }

    .log{
        font-size:12px;
        background:#0b0f1a;
        padding:10px;
        border-radius:10px;
        margin-bottom:8px;
        border:1px solid #1f2a44;
    }

    .tag{
        display:inline-block;
        font-size:11px;
        padding:2px 6px;
        background:#1f2a44;
        border-radius:6px;
        margin-right:4px;
    }

    .full{
        grid-column: span 2;
    }

    .insight{
        background:#0e1526;
        border-left:3px solid #4f7cff;
        padding:10px;
        border-radius:8px;
        font-size:12px;
        margin-top:10px;
    }
</style>
</head>

<body>

<header>
    <h1>🧠 AngelOS</h1>
    <small>Sistema Cognitivo de Desenvolvimento Infantil • Angelo Victor</small>
</header>

<div class="grid">

<!-- CHECK-IN -->
<div class="card">
    <h3>📅 Check-in Diário</h3>

    <label>Linguagem</label>
    <select id="linguagem">
        <option>baixo</option><option>medio</option><option>alto</option>
    </select>

    <label>Cognição</label>
    <select id="cognicao">
        <option>baixo</option><option>medio</option><option>alto</option>
    </select>

    <label>Brincadeira</label>
    <select id="brincadeira">
        <option>baixo</option><option>medio</option><option>alto</option>
    </select>

    <label>Atenção compartilhada</label>
    <select id="atencao">
        <option>baixo</option><option>medio</option><option>alto</option>
    </select>

    <label>Regulação emocional</label>
    <select id="regulacao">
        <option>calmo</option><option>instavel</option><option>irritado</option>
    </select>

    <label>Crises hoje</label>
    <input type="number" id="crises" value="0"/>

    <label>Bem-estar</label>
    <select id="bemestar">
        <option>ruim</option><option>ok</option><option>bom</option>
    </select>

    <label>Observações</label>
    <textarea id="obs"></textarea>

    <button onclick="save()">Salvar no AngelOS</button>
</div>

<!-- INSIGHTS -->
<div class="card">
    <h3>🔍 Inteligência do Sistema</h3>
    <div id="insights"></div>
</div>

<!-- HISTÓRICO -->
<div class="card full">
    <h3>🧠 Memória Longitudinal</h3>
    <div id="history"></div>
</div>

</div>

<script>
const KEY = "angelos_v1";

function load(){
    return JSON.parse(localStorage.getItem(KEY) || "[]");
}

function store(data){
    localStorage.setItem(KEY, JSON.stringify(data));
}

function save(){
    const entry = {
        date: new Date().toISOString().split("T")[0],
        linguagem: linguagem.value,
        cognicao: cognicao.value,
        brincadeira: brincadeira.value,
        atencao: atencao.value,
        regulacao: regulacao.value,
        crises: parseInt(crises.value || 0),
        bemestar: bemestar.value,
        obs: obs.value
    };

    const data = load();
    data.push(entry);
    store(data);

    obs.value = "";
    render();
}

function render(){
    const data = load().reverse();

    renderHistory(data);
    renderInsights(data);
}

function renderHistory(data){
    const history = document.getElementById("history");
    history.innerHTML = "";

    data.forEach(d=>{
        const div = document.createElement("div");
        div.className = "log";
        div.innerHTML = `
            <strong>${d.date}</strong><br>
            <span class="tag">L:${d.linguagem}</span>
            <span class="tag">C:${d.cognicao}</span>
            <span class="tag">B:${d.brincadeira}</span>
            <span class="tag">A:${d.atencao}</span>
            <span class="tag">R:${d.regulacao}</span>
            <span class="tag">Cr:${d.crises}</span>
            <span class="tag">${d.bemestar}</span>
            <br><small>${d.obs || ""}</small>
        `;
        history.appendChild(div);
    });
}

function map(v){
    return {baixo:1, medio:2, alto:3, ruim:1, ok:2, bom:3, calmo:3, instavel:2, irritado:1}[v] || 0;
}

function avg(data, key){
    if(!data.length) return 0;
    return (data.reduce((a,b)=>a+map(b[key]),0)/data.length).toFixed(2);
}

function renderInsights(data){
    const box = document.getElementById("insights");
    const last7 = data.slice(0,7);

    if(last7.length === 0){
        box.innerHTML = "Sem dados ainda.";
        return;
    }

    const crises = last7.reduce((a,b)=>a+b.crises,0);
    const regMedia = avg(last7,"regulacao");
    const lang = avg(last7,"linguagem");

    let insight = [];

    if(crises >= 3){
        insight.push("⚠️ Aumento de crises na semana — possível relação com frustração ou rotina.");
    }

    if(regMedia < 2){
        insight.push("⚠️ Regulação emocional abaixo da média recente.");
    }

    if(lang > 2.2){
        insight.push("📈 Linguagem em progresso consistente.");
    }

    if(insight.length === 0){
        insight.push("🧠 Padrão estável — sem variações relevantes detectadas.");
    }

    box.innerHTML = insight.map(i=>`<div class="insight">${i}</div>`).join("");
}

render();
</script>

</body>
</html>
