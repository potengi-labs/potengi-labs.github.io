<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>AngelOS v5 • Sistema Preditivo Cognitivo</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{
    margin:0;
    font-family: Arial;
    background:#0a0f1d;
    color:#eaeaea;
}

header{
    background:#121a2f;
    padding:16px;
    text-align:center;
    border-bottom:1px solid #1f2a44;
}

header h1{ margin:0; font-size:20px; }

.grid{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:14px;
    padding:14px;
}

.card{
    background:#121a2f;
    border:1px solid #1f2a44;
    border-radius:10px;
    padding:12px;
}

.full{ grid-column:span 2; }

input,select,textarea{
    width:100%;
    margin:6px 0;
    padding:8px;
    border-radius:8px;
    border:none;
    background:#0a0f1d;
    color:white;
}

button{
    width:100%;
    padding:10px;
    border:none;
    border-radius:10px;
    background:#4f7cff;
    color:white;
    cursor:pointer;
}

button:hover{ background:#3b63d1; }

.entry{
    font-size:12px;
    padding:10px;
    margin-bottom:8px;
    background:#0a0f1d;
    border-radius:8px;
    border:1px solid #1f2a44;
}

.badge{
    display:inline-block;
    font-size:11px;
    padding:2px 6px;
    background:#1f2a44;
    border-radius:6px;
    margin-right:4px;
}

.alert{
    padding:8px;
    margin-bottom:6px;
    border-left:3px solid #4f7cff;
    background:#0d1426;
    border-radius:8px;
    font-size:12px;
}
</style>
</head>

<body>

<header>
<h1>🧠 AngelOS v5</h1>
<small>IA Preditiva • Neurodashboard • Relatórios Clínicos</small>
</header>

<div class="grid">

<!-- CHECK-IN -->
<div class="card">
<h3>📅 Check-in Diário</h3>

<label>Linguagem</label>
<select id="linguagem"><option>baixo</option><option>medio</option><option>alto</option></select>

<label>Cognição</label>
<select id="cognicao"><option>baixo</option><option>medio</option><option>alto</option></select>

<label>Regulação</label>
<select id="regulacao"><option>instavel</option><option>media</option><option>estavel</option></select>

<label>Sono</label>
<select id="sono"><option>ruim</option><option>medio</option><option>bom</option></select>

<label>Rotina</label>
<select id="rotina"><option>instavel</option><option>media</option><option>organizada</option></select>

<label>Crises</label>
<input id="crises" type="number" value="0"/>

<label>Observações</label>
<textarea id="obs"></textarea>

<button onclick="save()">Salvar Registro</button>
</div>

<!-- IA PREDITIVA -->
<div class="card">
<h3>🔮 IA Preditiva (Risco)</h3>
<div id="risk"></div>
</div>

<!-- GRÁFICO -->
<div class="card full">
<h3>📊 Evolução Cognitiva Multivariável</h3>
<canvas id="chart"></canvas>
</div>

<!-- ISC -->
<div class="card">
<h3>🧠 Índice de Estabilidade Cognitiva (ISC)</h3>
<div id="isc"></div>
</div>

<!-- CORRELAÇÕES -->
<div class="card">
<h3>🔗 Correlações</h3>
<div id="corr"></div>
</div>

<!-- TIMELINE -->
<div class="card full">
<h3>🧭 Linha do Tempo</h3>
<div id="timeline"></div>
</div>

<!-- RELATÓRIO -->
<div class="card full">
<h3>📄 Relatório Clínico</h3>
<button onclick="report()">Gerar Relatório (PDF via navegador)</button>
<pre id="reportOut"></pre>
</div>

</div>

<script>

const KEY="angelos_v5";

function load(){
return JSON.parse(localStorage.getItem(KEY)||"[]");
}

function store(d){
localStorage.setItem(KEY,JSON.stringify(d));
}

function map(v){
return {
baixo:1,medio:2,alto:3,
ruim:1,medio:2,bom:3,
instavel:1,media:2,estavel:3,
organizada:3
}[v]||0;
}

function save(){
let d=load();

d.push({
date:new Date().toISOString().split("T")[0],
linguagem:linguagem.value,
cognicao:cognicao.value,
regulacao:regulacao.value,
sono:sono.value,
rotina:rotina.value,
crises:+crises.value,
obs:obs.value
});

store(d);
obs.value="";
render();
}

function render(){
let d=load();

renderChart(d);
renderRisk(d);
renderISC(d);
renderCorr(d);
renderTimeline(d);
}

let chart;

function renderChart(d){

if(chart) chart.destroy();

chart=new Chart(document.getElementById("chart"),{
type:"line",
data:{
labels:d.map(x=>x.date),
datasets:[
{label:"Linguagem",data:d.map(x=>map(x.linguagem)),borderColor:"#4f7cff"},
{label:"Cognição",data:d.map(x=>map(x.cognicao)),borderColor:"#ffb84f"},
{label:"Regulação",data:d.map(x=>map(x.regulacao)),borderColor:"#4fff9f"},
{label:"Crises",data:d.map(x=>x.crises),borderColor:"#ff4f4f"},
{label:"Sono",data:d.map(x=>map(x.sono)),borderColor:"#9b7cff"}
]
},
options:{scales:{y:{min:0,max:3}}}
});
}

function riskScore(d){

let last=d.slice(-7);

let score=0;

score += (3 - avg(last,"sono"));
score += (3 - avg(last,"rotina"));
score += avg(last,"crises");
score += (3 - avg(last,"regulacao"));

return Math.round(score);
}

function avg(d,k){
return d.reduce((a,b)=>a+map(b[k]),0)/d.length||0;
}

function renderRisk(d){

if(d.length<3){
risk.innerHTML="Sem dados suficientes.";
return;
}

let r=riskScore(d);

let level = r<=3?"🟢 Baixo": r<=6?"🟡 Médio":"🔴 Alto";

risk.innerHTML=`
<div class="alert">Score: ${r}</div>
<div class="alert">Nível: ${level}</div>
<div class="alert">Interpretação: risco baseado em sono, rotina, regulação e crises</div>
`;
}

function renderISC(d){

let last=d.slice(-7);
if(last.length===0){isc.innerHTML="Sem dados.";return;}

let val =
(avg(last,"linguagem")+
avg(last,"cognicao")+
avg(last,"regulacao")+
avg(last,"sono")+
avg(last,"rotina"))/5;

isc.innerHTML=`
<div class="alert">ISC: ${val.toFixed(2)}/3</div>
<div class="alert">Estado: ${val>2.3?"Estável":val>1.8?"Moderado":"Instável"}</div>
`;
}

function corr(x,y,d){

let n=d.length;
let sx=0,sy=0,sxy=0,sx2=0,sy2=0;

for(let i=0;i<n;i++){
let a=map(d[i][x]);
let b=map(d[i][y]);
sx+=a; sy+=b; sxy+=a*b; sx2+=a*a; sy2+=b*b;
}

return ((n*sxy - sx*sy) /
Math.sqrt((n*sx2-sx*sx)*(n*sy2-sy*sy))).toFixed(2);
}

function renderCorr(d){

if(d.length<5){
corr.innerHTML="Sem dados suficientes.";
return;
}

corr.innerHTML=`
<div class="alert">Sono × Crises: ${corr("sono","crises",d)}</div>
<div class="alert">Rotina × Regulação: ${corr("rotina","regulacao",d)}</div>
<div class="alert">Regulação × Linguagem: ${corr("regulacao","linguagem",d)}</div>
`;
}

function renderTimeline(d){

timeline.innerHTML=[...d].reverse().map(x=>`
<div class="entry">
<b>${x.date}</b><br>
<span class="badge">${x.linguagem}</span>
<span class="badge">${x.cognicao}</span>
<span class="badge">${x.regulacao}</span>
<span class="badge">${x.sono}</span>
<span class="badge">${x.rotina}</span>
<span class="badge">Cr:${x.crises}</span>
<br>${x.obs||""}
</div>
`).join("");
}

function report(){

let d=load().slice(-7);

let txt="ANGELoS v5 - RELATÓRIO CLÍNICO\n\n";

txt+="Período: últimos 7 registros\n\n";

txt+="ISC: "+((avg(d,"linguagem")+avg(d,"cognicao")+avg(d,"regulacao")+avg(d,"sono")+avg(d,"rotina"))/5).toFixed(2)+"\n\n";

txt+="Crises: "+d.reduce((a,b)=>a+b.crises,0)+"\n\n";

txt+="Correlação Sono × Crises: "+corr("sono","crises",d)+"\n";

txt+="Correlação Rotina × Regulação: "+corr("rotina","regulacao",d)+"\n";

txt+="\nResumo: sistema baseado em padrões longitudinais e heurísticas comportamentais.";

reportOut.innerText=txt;

let blob=new Blob([txt],{type:"text/plain"});
let a=document.createElement("a");
a.href=URL.createObjectURL(blob);
a.download="angelos_v5_relatorio.txt";
a.click();
}

render();

</script>

</body>
</html>
